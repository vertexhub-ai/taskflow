apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: taskflow
  namespace: taskflow
spec:
  parentRefs:
    - name: main-gateway
      namespace: envoy-gateway-system
  hostnames: ["taskflow.vertexhub.ai"]
  rules:
    - matches: [{path: {type: PathPrefix, value: /}}]
      backendRefs: [{name: taskflow, port: 80}]
